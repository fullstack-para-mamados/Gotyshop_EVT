spring:
  application:
    name: UsuarioService
  datasource:
    url: ${USUARIO_DB_URL:jdbc:sqlite:usuarios.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${USUARIO_PORT:8081}

jwt:
  secret: ${JWT_SECRET:GotyStoreSecretKey2024GotyStoreSecretKey2024GotyStoreSecretKey2024}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.example.UsuarioService: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
