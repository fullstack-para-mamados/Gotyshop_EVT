services:
  usuario-service:
    build: ./UsuarioService
    environment:
      USUARIO_PORT: 8081
      USUARIO_DB_URL: jdbc:sqlite:/data/usuarios.db
      JWT_SECRET: ${JWT_SECRET:-GotyStoreSecretKey2024GotyStoreSecretKey2024GotyStoreSecretKey2024}
    volumes:
      - usuario-data:/data
    ports:
      - "8081:8081"

  gotystore-service:
    build: ./GotyStore_JPA
    depends_on:
      - usuario-service
    environment:
      GOTYSTORE_PORT: 8080
      GOTYSTORE_DB_URL: jdbc:sqlite:/data/gotystore.db
      USUARIO_SERVICE_URL: http://usuario-service:8081
      JWT_SECRET: ${JWT_SECRET:-GotyStoreSecretKey2024GotyStoreSecretKey2024GotyStoreSecretKey2024}
    volumes:
      - gotystore-data:/data
    ports:
      - "8080:8080"

  api-gateway:
    build: ./ApiGateway
    depends_on:
      - usuario-service
      - gotystore-service
    environment:
      GATEWAY_PORT: 8082
      GOTYSTORE_SERVICE_URL: http://gotystore-service:8080
      USUARIO_SERVICE_URL: http://usuario-service:8081
    ports:
      - "8082:8082"

volumes:
  usuario-data:
  gotystore-data:
