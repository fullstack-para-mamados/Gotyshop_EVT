server:
  port: ${GATEWAY_PORT:8082}

spring:
  application:
    name: ApiGateway

  cloud:
    gateway:
      routes:
        - id: gotystore-service
          uri: ${GOTYSTORE_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/clientes/**,/api/juegos/**,/api/ventas/**

        - id: gotystore-auth
          uri: ${GOTYSTORE_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/auth/validar

        - id: usuario-service
          uri: ${USUARIO_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/usuarios/**,/api/auth/login,/api/auth/registro

        - id: gotystore-docs
          uri: ${GOTYSTORE_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/gotystore/v3/api-docs
          filters:
            - RewritePath=/gotystore/v3/api-docs, /v3/api-docs

        - id: usuario-docs
          uri: ${USUARIO_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/usuarioservice/v3/api-docs
          filters:
            - RewritePath=/usuarioservice/v3/api-docs, /v3/api-docs

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

springdoc:
  swagger-ui:
    path: /doc/swagger-ui.html
    urls:
      - name: GotyStore
        url: /gotystore/v3/api-docs
      - name: UsuarioService
        url: /usuarioservice/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

  endpoint:
    health:
      show-details: always

    gateway:
      enabled: true